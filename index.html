<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link rel="apple-touch-icon" href="assets/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 flex items-center justify-center min-h-screen p-4">

    <canvas id="background-canvas" class="fixed top-0 left-0 w-full h-full" style="z-index: -1;"></canvas>

    <!-- TELA DE UPLOAD (INICIAL) -->
    <div id="upload-screen"
        class="w-full max-w-md mx-auto bg-white dark:bg-gray-800 shadow-2xl rounded-2xl p-8 text-center transition-all duration-300">
        <h1 class="text-3xl font-bold text-blue-600 dark:text-blue-400 mb-2">Flashcards</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-8 text-sm">Carregue um arquivo .json ou crie um novo baralho agora
            mesmo.</p>

        <!-- Área de Upload de Arquivo -->
        <div
            class="mb-6 p-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg hover:border-blue-500 transition-colors">
            <input type="file" id="file-input" accept=".json"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
        </div>

        <div class="flex flex-col gap-3">
            <button id="start-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg text-lg transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400 disabled:scale-100 disabled:cursor-not-allowed"
                disabled>
                📂 Abrir Arquivo
            </button>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs">OU</span>
                <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
            </div>

            <!-- Botão Gerar com IA -->
            <a href="pages/generate.html" id="open-create-btn"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 px-4 rounded-xl text-lg transition-all transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
                ✨ Criar Novo com IA
            </a>
        </div>
        <p id="upload-error" class="text-red-500 mt-4 text-sm"></p>
    </div>


    <!-- Script carregado externamente -->
    <script src="js/index.js" type="module" defer></script>

    <!-- Service Worker (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('SW registrado: ', registration.scope))
                    .catch(err => console.log('SW falhou: ', err));
            });
        }
    </script>
</body>

</html>
